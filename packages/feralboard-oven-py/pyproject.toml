[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "feralboard-oven"
version = "0.1.0"
description = "Optional oven-domain simulator and CLI for FeralBoard OEM integrations."
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "feralboard-sdk>=0.1.0",
    "pyserial>=3.5",
]

[project.scripts]
feralboard-oven-sim = "feralboard_oven.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
feralboard_oven = ["py.typed"]
